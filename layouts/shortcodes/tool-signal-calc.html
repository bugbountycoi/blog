<!--Stylesheet for the Signal Calc tool.-->
<style>
    :root {
      --bg: #f5f5f7;
      --card-bg: #ffffff;
      --accent: #4caf50;
      --accent-soft: #81c784;
      --danger: #e53935;
      --text-main: #222;
      --text-muted: #666;
      --border-subtle: #e0e0e0;
      --pill-bg: #f2f2f2;
      --btn-bg: #e5e5e5;
      --btn-bg-hover: #d5d5d5;
      --shadow-soft: 0 2px 8px rgba(0,0,0,0.08);
      --radius-card: 12px;
      --radius-pill: 20px;
      --radius-btn: 6px;
      --transition-fast: 0.2s ease;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text-main);
    }

    .signal-calc {
      max-width: 960px;
      margin: 24px auto 80px;
      padding: 0 16px 40px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.6rem;
      font-weight: 650;
    }

    p.subtitle {
      margin: 0 0 20px;
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    .floating-header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: linear-gradient(to bottom, rgba(245,245,247,0.98), rgba(245,245,247,0.9));
      backdrop-filter: blur(8px);
      padding: 10px 12px;
      margin: 0 -16px 16px;
      border-bottom: 1px solid rgba(0,0,0,0.06);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .floating-header-left {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .floating-header-title {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .floating-header-main {
      display: flex;
      align-items: baseline;
      gap: 10px;
      flex-wrap: wrap;
    }

    .total-mod-label {
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .total-mod {
      font-weight: 700;
      font-size: 1.1rem;
      padding: 2px 8px;
      border-radius: 999px;
      min-width: 48px;
      text-align: center;
    }

    .total-mod.pos {
      color: #1b5e20;
      background: #e8f5e9;
    }

    .total-mod.neg {
      color: #b71c1c;
      background: #ffebee;
    }

    .floating-header-right {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .chip {
      font-size: 0.8rem;
      padding: 4px 10px;
      border-radius: 999px;
      background: #e3f2fd;
      color: #0d47a1;
      font-weight: 500;
    }

    .scroll-top-btn {
      border: none;
      background: #eeeeee;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 0.8rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .scroll-top-btn:hover {
      background: #e0e0e0;
    }

    .card {
      background: var(--card-bg);
      padding: 16px;
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-soft);
      margin-bottom: 20px;
    }

    .card h3 {
      margin-top: 0;
      margin-bottom: 12px;
      font-size: 1.1rem;
      font-weight: 600;
    }

    .baseline-card h3,
    .adjusted-card h3 {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .baseline-card h3::before {
      content: "⚙️";
      font-size: 1rem;
    }

    .adjusted-card h3::before {
      content: "📊";
      font-size: 1rem;
    }

    .baseline-row {
      display: grid;
      grid-template-columns: 1.4fr auto auto;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--border-subtle);
      gap: 12px;
    }

    .baseline-row:last-child {
      border-bottom: none;
    }

    .baseline-label {
      font-weight: 500;
      font-size: 0.95rem;
    }

    .baseline-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      justify-content: flex-end;
    }

    .value-pill {
      background: var(--pill-bg);
      padding: 4px 10px;
      border-radius: var(--radius-pill);
      font-size: 0.9rem;
      font-weight: 500;
      min-width: 40px;
      text-align: center;
    }

    .btn-group {
      display: flex;
      gap: 4px;
    }

    .icon-btn {
      width: 28px;
      height: 28px;
      border-radius: var(--radius-btn);
      border: none;
      background: var(--btn-bg);
      cursor: pointer;
      font-size: 1rem;
      font-weight: bold;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background var(--transition-fast), transform var(--transition-fast);
    }

    .icon-btn:hover:not(:disabled) {
      background: var(--btn-bg-hover);
      transform: translateY(-1px);
    }

    .icon-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .scale-row {
      display: grid;
      /* label on left, bar fills remaining space */
      grid-template-columns: auto 1fr;
      align-items: center;
      gap: 12px;
      padding: 8px 0;
    }

    .scale-bar {
      background: #f0f0f0;
      height: 18px;
      border-radius: 9px;
      overflow: hidden;
    }

    .scale-fill {
      background: linear-gradient(90deg, var(--accent), var(--accent-soft));
      height: 100%;
      border-radius: 9px;
      transition: width 0.25s ease;
    }

    .scale-values {
      /* removed: we no longer display separate values
         they are now part of the label */
      display: none;
    }

    .scale-label {
      font-size: 0.95rem;
      font-weight: 600;
      text-align: left;
      /* background/text will be set dynamically in JavaScript */
      padding: 2px 6px;
      border-radius: 4px;
    }

    .scale-row.highlighted {
      background: rgba(76, 175, 80, 0.15);
      padding: 12px 8px;
      border-radius: 6px;
      border-left: 5px solid var(--accent);
      box-shadow: 0 0 0 1px rgba(76, 175, 80, 0.3), 0 4px 12px rgba(76, 175, 80, 0.15);
      transform: translateX(2px);
    }

    .signal-input-row {
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      margin-bottom: 12px;
      border-bottom: 1px solid var(--border-subtle);
    }

    .signal-input-label {
      font-weight: 600;
      font-size: 0.95rem;
    }

    .signal-input-field {
      padding: 8px 12px;
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-btn);
      font-size: 0.95rem;
      font-family: inherit;
    }

    .signal-input-field:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(76, 175, 80, 0.2);
    }

    .reset-btn {
      margin-top: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
      background: #424242;
      color: #fff;
      transition: background var(--transition-fast), transform var(--transition-fast);
    }

    .reset-btn.secondary {
      background: #757575;
      margin-bottom: 16px;
    }

    .reset-btn:hover {
      background: #212121;
      transform: translateY(-1px);
    }

    .reset-btn.secondary:hover {
      background: #616161;
    }

    .modifiers-card h3 {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .modifiers-card h3::before {
      content: "🎛️";
      font-size: 1rem;
    }

    .modifier-group {
      margin-bottom: 16px;
    }

    .modifier-group-title {
      font-weight: 600;
      margin-bottom: 6px;
      font-size: 0.95rem;
    }

    .modifier-group-desc {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .modifier-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .mod-btn {
      border-radius: 999px;
      border: 1px solid transparent;
      padding: 6px 10px;
      font-size: 0.85rem;
      cursor: pointer;
      background: #eeeeee;
      color: #333;
      transition: background var(--transition-fast), color var(--transition-fast), border-color var(--transition-fast), transform var(--transition-fast);
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .mod-btn.positive {
      border-color: rgba(56,142,60,0.4);
      background: #e8f5e9;
      color: #1b5e20;
    }

    .mod-btn.negative {
      border-color: rgba(211,47,47,0.4);
      background: #ffebee;
      color: #b71c1c;
    }

    /* ACTIVE STATE — POSITIVE MODIFIERS */
    .mod-btn.active.positive {
        background: #2e7d32 !important;      /* strong green */
        color: #ffffff !important;
        border-color: #1b5e20 !important;
        box-shadow: 0 2px 6px rgba(0,0,0,0.25),
                    0 0 0 2px rgba(46,125,50,0.45);
        transform: translateY(-2px);
    }

    .mod-btn.active.positive .points {
        color: #c8e6c9 !important;
    }

    /* ACTIVE STATE — NEGATIVE MODIFIERS */
    .mod-btn.active.negative {
        background: #c62828 !important;      /* strong red */
        color: #ffffff !important;
        border-color: #8e0000 !important;
        box-shadow: 0 2px 6px rgba(0,0,0,0.25),
                    0 0 0 2px rgba(198,40,40,0.45);
        transform: translateY(-2px);
    }

    .mod-btn.active.negative .points {
        color: #ffcdd2 !important;
    }

    .mod-btn span.points {
      font-weight: 600;
      font-size: 0.8rem;
      opacity: 0.9;
    }

    .footer-note {
      margin-top: 24px;
      font-size: 0.8rem;
      color: var(--text-muted);
      text-align: center;
    }

    @media (max-width: 720px) {
      .baseline-row {
        grid-template-columns: 1fr;
        align-items: flex-start;
      }
      .scale-row {
        grid-template-columns: 1fr;
        align-items: flex-start;
      }
      .scale-values {
        display: none;
      }
      .floating-header {
        flex-direction: column;
        align-items: flex-start;
      }
      .floating-header-right {
        align-self: stretch;
        justify-content: space-between;
      }
    }
  </style>




<!-- JavaScript for the Signal Calc tool. -->

<script>
    (function () {
      const root = document.getElementById("signal-calc");

      const baseline = [

      ];

      let baselineRanges = JSON.parse(JSON.stringify(baseline));

      // modifiers may now be objects with `desc` and `items` properties.

            { pts: -5,  label: "Public + VDP + Private", code: "PVI", tooltip: "Private programs can help offset public/vdp program noise. This combination is not advised." },
            { pts: -3,  label: "VDP + Private",          code: "VI",  tooltip: "Alternative to Public+Private; lower signal occurs because VDPs do not offer rewards and therefore no risk to the researcher." },
            { pts: +5,  label: "Public + Private",       code: "PI",  tooltip: "Most common arrangement for companies with multiple programs." },
            { pts: +10, label: "Private",                code: "I",   tooltip: "Private programs are often the most single-rich, as they typically attract more experienced researchers and higher-quality reports." }
          ]
        },

        "Types of Included Assets": {
          code: "ISA",
          desc: "Multi-Select. What types of assets are in-scope for your programs?",
          items: [
            { pts: -5, label: "Many OSS assets",              code: "M",  tooltip: "Many open-source assets in-scope can reduce signal quality because of free sast tools available to researchers." },
            { pts: -3, label: "Wildcard domains",             code: "W",  tooltip: "'Free-and-open' or unbounded scope is very attractive to researchers." },
            { pts: -2, label: "One/few OSS assets",           code: "O",  tooltip: "Open-source assets are often less signal-rich than proprietary assets." },
            { pts: -2, label: "Software assets",              code: "S",  tooltip: "Disassembly tools are becoming more accessible to researchers, but the skills to develop exploits are lagging behind." },
            { pts: -2, label: "Software-as-a-Service assets", code: "SA", tooltip: "SaaS products are the primary target for researchers because they are often more accessible and easier to exploit." },
            { pts: -1, label: "Firmware assets",              code: "F",  tooltip: "Firmware assets are often harder to analyze properly and exploit." },
            { pts: +1, label: "Mobile apps",                  code: "MA", tooltip: "Mobile apps are often a combination of SaaS/API structures." },
            { pts: +1, label: "IT/Infrastructure",            code: "IT", tooltip: "IT/Infrastructure assets are often found to have misconfigurations that are exploitable." },
            { pts: +2, label: "Hardware assets",              code: "H",  tooltip: "Hardware assets are often harder to exploit and require more specialized knowledge." }
          ]
        },

        "Types of Excluded Assets": {
          code: "OOSA",
          desc: "Multi-Select. What types of assets does your company have, but are out-of-scope for your programs?",
          items: [
            { pts: -5, label: "IT/Infrastructure",     code: "IT", tooltip: "" },
            { pts: -3, label: "Many OSS assets",       code: "M",  tooltip: "" },
            { pts: +1, label: "One/few OSS assets",    code: "O",  tooltip: "" },
            { pts: +1, label: "Mobile apps",           code: "MA", tooltip: "" },
            { pts: +2, label: "Wildcard domains",      code: "W",  tooltip: "" },
            { pts: +2, label: "Software-as-a-Service", code: "SA", tooltip: "" },
            { pts: +2, label: "Physical products",     code: "P",  tooltip: "" }
          ]
        },

        "Total Asset Volume": {
          code: "TAV",
          exclusive: true,
          desc: "Select only one. Approximate number of in-scope targets.",
          items: [
            { pts: -8, label: "Extra Large (e.g. 500+ assets)",  code: "XL", tooltip: "An immense number of targets increases submission volume and risks lower signal." },
            { pts: -4, label: "Large (e.g. 100-500 assets)",     code: "L",  tooltip: "Large program scale offers much more room for noise to occur." },
            { pts: +1, label: "Standard (e.g. 25-100 assets)",   code: "R",  tooltip: "A moderate number of assets." },
            { pts: +4, label: "Small (e.g. 5-25 assets)",        code: "S",  tooltip: "Scope is easy to maintain but will be unapproachable by most researchers." },
            { pts: +8, label: "Hyper-Focused (e.g. 1-5 assets)", code: "HF", tooltip: "Extremely tight scope generally produces higher signal and much lower volume." }
          ]
        },

        "Engagement Activities": {
          code: "EA",
          desc: "Multi-Select. Initiatives to attract researchers and support the community.",
          items: [
            { pts: -2, label: "Hacker community sponsorship", code: "HCS", tooltip: "Sponsoring hacker communities increases visibility and engagement; This can help build a strong, active community around your bug bounty program." },
            { pts: -1, label: "Public Show & Tell",           code: "PST", tooltip: "Publicly showcasing program features and progress builds trust and awareness, drawing new researchers to your program and provides guidance on what you find valuable." },
            { pts: +1, label: "1–3 promotions/bonuses",       code: "PR1", tooltip: "Offering rewards or promotions encourages participation in specific in-scope areas directly driving signal." },
            { pts: +1, label: "Public training webinar",      code: "WEB", tooltip: "Hosting webinars helps educate researchers about your products and improve report quality." }
          ]
        },

        "Live Hacking Events": {
          code: "LHE",
          exclusive: true,
          desc: "Select only one. In-person event types in one year.",
          items: [
            { pts: +5,  label: "One LHE",  code: "L1", tooltip: "One live hacking event in a year increases visibility and engagement." },
            { pts: +8,  label: "2–3 LHE",  code: "L2", tooltip: "Multiple LHEs in a year significantly increases visibility and engagement. Be cautious about repeated scope at events." },
            { pts: +12, label: "4+ LHE",   code: "L4", tooltip: "Many events in a year greatly reduces the baseline volume your program will expect. Resaerchers will be working behind the scenes to prepare for the next event and will hold onto vulnerabilities anticipating event scope." }
          ]
        },

        "Public Virtual Hacking Events": {
          code: "PVHE",
          exclusive: true,
          desc: "Select only one. Virtual event types in one year.",
          items: [
            { pts: -5,  label: "One public VHE",  code: "PV1", tooltip: "One public VHE in a year increases visibility and engagement." },
            { pts: -8,  label: "2-3 public VHE",  code: "PV2", tooltip: "Multiple opportuntities to access new researchers brings a continual learning curve of noise." },
            { pts: -12,  label: "4+ public VHE",  code: "PV4", tooltip: "Many events in a year is not advised." }
          ]
        },

        "Invite-only Virtual Hacking Events": {
          code: "IVHE",
          exclusive: true,
          desc: "Select only one. Virtual event types in one year.",
          items: [
            { pts: +2,  label: "One invite-only VHE",  code: "IV1", tooltip: "One invite-only VHE in a year directly engages your community and will bring higher signal." },
            { pts: +4,  label: "2-3 invite-only VHE",  code: "IV2", tooltip: "Multiple invite-only VHEs can be leveraged to raise signal by targeting specific researcher groups or products." },
            { pts: +5,  label: "4+ invite-only VHE",   code: "IV4", tooltip: "Many invite-only VHEs in a year greatly reduces the baseline volume your program will expect." }
          ]
        }
      };


      const state = {
        active: {},
        total: 0,
        baselineModified: false
      };

      // separator used in URL parameters (tilde chosen as safe char)
      const SEP = "~";

      function createEl(tag, props = {}, children = []) {
        const el = document.createElement(tag);
        for (const [k, v] of Object.entries(props)) {
          if (k === "text") {
            el.textContent = v;
          } else if (k === "class") {
            el.className = v;
          } else if (k === "style") {
            el.setAttribute("style", v);
          } else if (k === "disabled") {
            if (v) el.disabled = true;
          } else {
            el.setAttribute(k, v);
          }
        }
        if (!Array.isArray(children)) children = [children];
        children.forEach(c => {
          if (c) el.appendChild(c);
        });
        return el;
      }

      // Helper to combine group code and item code into a unique full code
      function getFullCode(groupCode, itemCode) {
        return groupCode + "_" + itemCode;
      }

      function buildInitialUI() {
        const title = createEl("h1", { text: "Signal Estimation" });
        const subtitle = createEl("p", {
          class: "subtitle",
          text: "Adjust the baseline ranges and apply program modifiers to estimate the overall signal strength."
        });
        root.appendChild(title);
        root.appendChild(subtitle);

        const header = createEl("div", { class: "floating-header" });

        const left = createEl("div", { class: "floating-header-left" });
        const headerTitle = createEl("div", {
          class: "floating-header-title",
          text: "Current signal estimate"
        });
        const main = createEl("div", { class: "floating-header-main" });

        const totalLabel = createEl("span", {
          class: "total-mod-label",
          text: "Total modifier:"
        });
        const totalSpan = createEl("span", {
          class: "total-mod",
          text: "+0"
        });
        totalSpan.classList.add("pos");
        totalSpan.setAttribute("data-role", "total-mod");

        main.appendChild(totalLabel);
        main.appendChild(totalSpan);

        left.appendChild(headerTitle);
        left.appendChild(main);

        const right = createEl("div", { class: "floating-header-right" });
        const chip = createEl("div", {
          class: "chip",
          text: "Baseline + Modifiers → Target Signal Zones"
        });
        
        const copyUrlBtn = createEl("button", {
          class: "scroll-top-btn",
          id: "copy-url-btn",
          text: "Copy URL"
        });
        
        const resetBaselineBtn = createEl("button", {
          class: "scroll-top-btn",
          id: "reset-baseline",
          text: "Reset Baseline"
        });
        
        const resetModsBtn = createEl("button", {
          class: "scroll-top-btn",
          id: "reset-modifiers",
          text: "Reset Modifiers"
        });
        
        const scrollBtn = createEl("button", {
          class: "scroll-top-btn",
          id: "scroll-top",
          text: "Back to top"
        });

        right.appendChild(chip);
        right.appendChild(copyUrlBtn);
        right.appendChild(resetBaselineBtn);
        right.appendChild(resetModsBtn);
        right.appendChild(scrollBtn);

        header.appendChild(left);
        header.appendChild(right);
        root.appendChild(header);

        const adjustedCard = createEl("div", { class: "card adjusted-card" });
        adjustedCard.appendChild(createEl("h3", { text: "Target Signal Zones" }));
        adjustedCard.appendChild(createEl("div", { class: "scale-box" }));
        
        const signalInputRow = createEl("div", { class: "signal-input-row" });
        signalInputRow.appendChild(createEl("label", {
          class: "signal-input-label",
          text: "Your Signal %"
        }));
        const signalInput = createEl("input", {
          type: "number",
          class: "signal-input-field",
          id: "signal-input",
          min: "0",
          max: "100",
          placeholder: "Enter 0-100"
        });
        signalInputRow.appendChild(signalInput);
        adjustedCard.appendChild(signalInputRow);
        
        root.appendChild(adjustedCard);

        const baselineCard = createEl("div", { class: "card baseline-card" }, [
          createEl("h3", { text: "Baseline Ranges" }),
          createEl("div", { class: "baseline-box" })
        ]);
        root.appendChild(baselineCard);

        const modifiersCard = createEl("div", { class: "card modifiers-card" });
        const modTitle = createEl("h3", { text: "Program Modifiers" });
        modifiersCard.appendChild(modTitle);

        Object.entries(modifiers).forEach(([groupName, groupData]) => {
          const group = createEl("div", { class: "modifier-group" });
          const groupTitle = createEl("div", {
            class: "modifier-group-title",
            text: groupName
          });
          group.appendChild(groupTitle);

          // optional description field
          const desc = groupData && groupData.desc;
          if (desc) {
            const descEl = createEl("div", {
              class: "modifier-group-desc",
              text: desc
            });
            group.appendChild(descEl);
          }

          const btnRow = createEl("div", { class: "modifier-buttons" });
          const items = Array.isArray(groupData) ? groupData : groupData.items || [];

          items.forEach((item, idx) => {
            const fullCode = getFullCode(groupData.code, item.code);
            const props = {
              class: "mod-btn " + (item.pts >= 0 ? "positive" : "negative"),
              "data-group": groupName,
              "data-index": idx.toString(),
              "data-code": fullCode
            };
            if (item.tooltip) {
              props.title = item.tooltip;
            }
            const btn = createEl("button", props);

            const ptsSpan = createEl("span", {
              class: "points",
              text: (item.pts >= 0 ? "+" : "") + item.pts
            });
            const labelSpan = createEl("span", { text: item.label });

            btn.appendChild(ptsSpan);
            btn.appendChild(labelSpan);
            btnRow.appendChild(btn);
          });

          group.appendChild(btnRow);
          modifiersCard.appendChild(group);
        });
        root.appendChild(modifiersCard);

        const footer = createEl("div", {
          class: "footer-note",
          text: "Baseline ranges and modifiers are for estimation and exploration only."
        });
        root.appendChild(footer);
      }

      function clampBaseline() {
        baselineRanges.forEach(r => {
          r.min = Math.max(0, r.min);
          r.max = Math.min(100, r.max);
        });

        baselineRanges[0].min = 0;

        baselineRanges.forEach(r => {
          if (r.max <= r.min) {
            r.max = r.min + 1;
          }
        });

        for (let i = 1; i < baselineRanges.length; i++) {
          const prev = baselineRanges[i - 1];
          const curr = baselineRanges[i];

          if (curr.min <= prev.max) {
            curr.min = prev.max + 1;
          }

          if (curr.max <= curr.min) {
            curr.max = curr.min + 1;
          }
        }

        for (let i = baselineRanges.length - 2; i >= 0; i--) {
          const curr = baselineRanges[i];
          const next = baselineRanges[i + 1];

          if (curr.max >= next.min) {
            curr.max = next.min - 1;
          }

          if (curr.max <= curr.min) {
            curr.min = curr.max - 1;
            if (curr.min < 0) curr.min = 0;
          }
        }

        baselineRanges[baselineRanges.length - 1].max = 100;
      }

      function renderBaselineEditor() {
        const box = root.querySelector(".baseline-box");
        box.innerHTML = "";

        baselineRanges.forEach((r, i) => {
          const row = createEl("div", { class: "baseline-row" });

          const label = createEl("div", { class: "baseline-label", text: r.label });
          row.appendChild(label);

          const minControls = createEl("div", { class: "baseline-controls" }, [
            createEl("span", { class: "value-pill", text: r.min }),
            createEl("div", { class: "btn-group" }, [
              createEl("button", {
                class: "baseline-btn icon-btn",
                "data-index": i,
                "data-bound": "min",
                "data-dir": "-",
                text: "–",
                disabled: i === 0
              }),
              createEl("button", {
                class: "baseline-btn icon-btn",
                "data-index": i,
                "data-bound": "min",
                "data-dir": "+",
                text: "+",
                disabled: i === 0
              })
            ])
          ]);

          const maxControls = createEl("div", { class: "baseline-controls" }, [
            createEl("span", { class: "value-pill", text: r.max }),
            createEl("div", { class: "btn-group" }, [
              createEl("button", {
                class: "baseline-btn icon-btn",
                "data-index": i,
                "data-bound": "max",
                "data-dir": "-",
                text: "–",
                disabled: i === baselineRanges.length - 1
              }),
              createEl("button", {
                class: "baseline-btn icon-btn",
                "data-index": i,
                "data-bound": "max",
                "data-dir": "+",
                text: "+",
                disabled: i === baselineRanges.length - 1
              })
            ])
          ]);

          row.appendChild(minControls);
          row.appendChild(maxControls);

          box.appendChild(row);
        });
      }

      function applyShift(baselineRanges, total) {
        // shift every boundary by the total amount
        const shifted = baselineRanges.map((r, i) => {
          return {
            orig: r,
            min: r.min + total,
            max: r.max + total
          };
        });

        // pin endpoints to 0/100 before fixing adjacency
        if (shifted.length) {
          if (shifted[0].min < 0) {
            shifted[0].min = 0;
            if (shifted[0].max <= shifted[0].min) {
              shifted[0].max = shifted[0].min + 1;
            }
          }
          const last = shifted[shifted.length - 1];
          if (last.max > 100) {
            last.max = 100;
            if (last.max <= last.min) {
              last.min = last.max - 1;
            }
          }
          if (last.max < 100) {
            // negative shifts may push the top below 100; pin it
            last.max = 100;
            if (last.min >= last.max) {
              last.min = last.max - 1;
            }
          }
        }

        // ensure ranges are consecutive and at least 1 unit wide
        for (let i = 1; i < shifted.length; i++) {
          const prev = shifted[i - 1];
          const curr = shifted[i];
          if (curr.min <= prev.max) {
            curr.min = prev.max + 1;
            if (curr.max <= curr.min) {
              curr.max = curr.min + 1;
            }
          }
        }

        // clamp all ranges within 0..100 and add label/emoji
        return shifted.map((s, i) => {
          let min = Math.max(0, s.min);
          let max = Math.min(100, s.max);
          if (max <= min) max = min + 1;
          const emoji = baseline[i].label.split(" ")[0];
          const label = `${emoji} ${min}–${max}%`;
          return { label, min, max };
        });
      }

      function clampRanges(ranges) {
        return ranges.map(r => {
          let min = Math.max(0, r.min);
          let max = Math.min(100, r.max);
          if (max < min + 1) max = min + 1;
          return { ...r, min, max };
        });
      }

      function renderScale(ranges, total) {
        const scaleBox = root.querySelector(".scale-box");
        scaleBox.innerHTML = "";
        
        const signalInput = root.querySelector("#signal-input");
        const userSignal = signalInput && signalInput.value ? parseFloat(signalInput.value) : null;

        ranges.forEach((r) => {
          let rowClass = "scale-row";
          
          if (userSignal !== null && userSignal >= r.min && userSignal <= r.max) {
            rowClass += " highlighted";
          }
          
          const bar = createEl("div", { class: rowClass });

          // pull the emoji (first word) from the original label and show
          // it before the numeric range so we have a coloured icon indicator
          const emoji = r.label.split(" ")[0];
          const label = createEl("div", {
            class: "scale-label",
            text: `${emoji} ${r.min}–${r.max}%`
          });
          // color the pill based on the emoji
          const colorMap = {
            "🔴": "#e53935",
            "🟠": "#fb8c00",
            "🟡": "#fdd835",
            "🟢": "#43a047",
            "🔵": "#1e88e5"
          };
          const fg = "#ffffff";
          if (colorMap[emoji]) {
            label.style.backgroundColor = colorMap[emoji];
            label.style.color = fg;
          }

          const rawWidth = r.max - r.min;
          const visualWidth = Math.max(5, rawWidth * 2); // exaggerate by 100%
          const range = createEl("div", { class: "scale-bar" }, [
            createEl("div", {
              class: "scale-fill",
              style: `width:${visualWidth}%;`
            })
          ]);

          bar.appendChild(label);
          bar.appendChild(range);

          scaleBox.appendChild(bar);
        });

        const totalSpan = root.querySelector('[data-role="total-mod"]');
        totalSpan.textContent = (total >= 0 ? "+" : "") + total;
        totalSpan.className = "total-mod " + (total >= 0 ? "pos" : "neg");
      }

      function calculateTotal(active) {
        return Object.values(active).reduce((sum, v) => sum + v, 0);
      }

      function encodeURL() {
        const params = new URLSearchParams();

        // --- Encode active modifiers by group ---
        Object.entries(modifiers).forEach(([groupName, groupData]) => {
          const groupCode = groupData.code;
          const items = groupData.items || [];
          const activeCodes = items
            .filter(item => state.active[getFullCode(groupCode, item.code)])
            .map(item => item.code);
          if (activeCodes.length) {
            params.set(groupCode, activeCodes.join(SEP));
          }
        });

        // --- Only encode adjusted range if baseline has been modified ---
        if (state.baselineModified) {
          const shifted = applyShift(baselineRanges, state.total);
          const clamped = clampRanges(shifted);
          const adj = clamped.map(r => `${r.min}-${r.max}`).join(SEP);
          params.set("adj", adj);
        }

        const newUrl = window.location.pathname + "?" + params.toString();
        window.history.replaceState({}, "", newUrl);
      }


      function decodeURL() {
        const params = new URLSearchParams(window.location.search);

        state.active = {};

        // --- Decode modifiers from group parameters ---
        Object.entries(modifiers).forEach(([groupName, groupData]) => {
          const groupCode = groupData.code;
          const items = groupData.items || [];
          const groupModsParam = params.get(groupCode);
          if (groupModsParam) {
            const codes = groupModsParam.split(SEP);
            items.forEach(item => {
              if (codes.includes(item.code)) {
                const fullCode = getFullCode(groupCode, item.code);
                state.active[fullCode] = item.pts;
              }
            });
          }
        });

        const adjParam = params.get("adj");
        if (adjParam) {
            const parts = adjParam.split(SEP);
            if (parts.length === baselineRanges.length) {
                const parsed = parts.map(p => {
                const [minStr, maxStr] = p.split("-");
                return {
                    min: parseInt(minStr, 10),
                    max: parseInt(maxStr, 10)
                };
                });

                // Replace baselineRanges with decoded adjusted ranges
                parsed.forEach((p, i) => {
                if (!isNaN(p.min) && !isNaN(p.max)) {
                    baselineRanges[i].min = p.min;
                    baselineRanges[i].max = p.max;
                }
                });

                clampBaseline();
            }
        }
      }

      function renderModifiers() {
        const buttons = root.querySelectorAll(".mod-btn");
        buttons.forEach(btn => {
          const code = btn.getAttribute("data-code");
          if (state.active[code]) {
            btn.classList.add("active");
          } else {
            btn.classList.remove("active");
          }
        });
      }

      function resetBaseline() {
        baselineRanges = JSON.parse(JSON.stringify(baseline));
        state.baselineModified = false;
        clampBaseline();
        renderBaselineEditor();
        update();
      }

      function resetModifiers() {
        state.active = {};
        renderModifiers();
        update();
      }

      function update() {
        state.total = calculateTotal(state.active);
        const shifted = applyShift(baselineRanges, state.total);
        const clamped = clampRanges(shifted);
        renderScale(clamped, state.total);
        encodeURL();
      }

      function handleSignalInput(e) {
        const total = state.total;
        const shifted = applyShift(baselineRanges, total);
        const clamped = clampRanges(shifted);
        renderScale(clamped, total);
      }

      function handleClick(e) {
        const btn = e.target.closest("button");
        if (!btn) return;

        if (btn.id === "scroll-top") {
          window.scrollTo({ top: 0, behavior: "smooth" });
          return;
        }

        if (btn.id === "copy-url-btn") {
          const url = window.location.href;
          navigator.clipboard.writeText(url).then(() => {
            const originalText = btn.textContent;
            btn.textContent = "Copied!";
            setTimeout(() => {
              btn.textContent = originalText;
            }, 2000);
          });
          return;
        }

        if (btn.id === "reset-baseline") {
          resetBaseline();
          return;
        }

        if (btn.id === "reset-modifiers") {
          resetModifiers();
          return;
        }

        if (btn.classList.contains("mod-btn")) {
          const code = btn.getAttribute("data-code");
          const groupName = btn.getAttribute("data-group");
          const idx = parseInt(btn.getAttribute("data-index"), 10);
          const groupData = modifiers[groupName];
          const groupCode = groupData.code;
          const item = groupData.items[idx];

          // If already active, just toggle off
          if (state.active[code]) {
            delete state.active[code];
            renderModifiers();
            update();
            return;
          }

          // If group is exclusive, clear all other items in this group
          if (groupData.exclusive) {
            groupData.items.forEach(other => {
              const otherCode = getFullCode(groupCode, other.code);
              if (state.active[otherCode]) {
                delete state.active[otherCode];
              }
            });
          }

          // Activate this item
          state.active[code] = item.pts;

          renderModifiers();
          update();
          return;
        }


        if (btn.classList.contains("baseline-btn")) {
          const i = parseInt(btn.getAttribute("data-index"), 10);
          const bound = btn.getAttribute("data-bound");
          const dir = btn.getAttribute("data-dir");

          const delta = dir === "+" ? 1 : -1;
          baselineRanges[i][bound] += delta;
          state.baselineModified = true;

          clampBaseline();
          renderBaselineEditor();
          update();
          return;
        }
      }

      buildInitialUI();
      decodeURL();
      clampBaseline();
      renderBaselineEditor();
      renderModifiers();
      update();

      const signalInput = root.querySelector("#signal-input");
      if (signalInput) {
        signalInput.addEventListener("input", handleSignalInput);
      }

      document.addEventListener("click", handleClick);
    })();
</script>
